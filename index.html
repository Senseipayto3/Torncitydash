<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Torn Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="centered">
    <div class="login-box">
        <h2>Torn Dashboard</h2>
        <p>Enter your API key to continue</p>
        <input type="password" id="apiKeyInput" placeholder="API Key">
        <button id="loginBtn">Continue</button>
        <p id="loginError" class="error"></p>
    </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar">
        <h3>Dashboard</h3>
        <nav>
            <button data-page="player">Player</button>
            <button data-page="faction">Faction</button>
            <button data-page="company">Company</button>
            <button data-page="stocks">Stocks</button>
            <button data-page="crimes">Crimes</button>
            <button data-page="travel">Travel</button>
            <button data-page="items">Items</button>
            <button data-page="logs">Logs</button>
            <button data-page="analytics">Analytics</button>
        </nav>
    </aside>

    <!-- CONTENT -->
    <main id="content">
        <h2>Welcome</h2>
        <p>Select a module from the sidebar.</p>
    </main>

</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
