<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torn City Player Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #2196f3;
            --success-color: #4caf50;
            --error-color: #f44336;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .key-input-box {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        input[type="password"] {
            width: 60%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #111;
            color: #fff;
        }
        button {
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #1976d2; }
        .error { color: var(--error-color); margin-top: 10px; display: none; }
        .dashboard { display: none; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { margin-top: 0; border-bottom: 2px solid #444; padding-bottom: 8px; color: var(--accent-color); }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95em; }
        .stat-label { color: #aaa; }
        .stat-value { font-weight: bold; }
        .bar-container { background-color: #111; border-radius: 4px; height: 12px; width: 100%; margin-top: 4px; overflow: hidden; }
        .bar { height: 100%; width: 0%; transition: width 0.5s ease; }
        .energy-bar { background-color: var(--success-color); }
        .nerve-bar { background-color: #ff9800; }
        .life-bar { background-color: var(--error-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>Torn City Player Dashboard</h1>
    
    <div class="key-input-box">
        <label for="apiKey" style="display:block; margin-bottom: 8px;">Enter your Torn API Key:</label>
        <input type="password" id="apiKey" placeholder="Paste your API key here..." autocomplete="off">
        <button onclick="fetchTornData()">Load Dashboard</button>
        <div id="errorMessage" class="error"></div>
    </div>

    <div id="dashboard" class="dashboard">
        <!-- Profile Overview -->
        <div class="card">
            <h3>Basic Profile</h3>
            <div class="stat-row"><span class="stat-label">Name:</span><span class="stat-value" id="p-name">-</span></div>
            <div class="stat-row"><span class="stat-label">Level:</span><span class="stat-value" id="p-level">-</span></div>
            <div class="stat-row"><span class="stat-label">Rank:</span><span class="stat-value" id="p-rank">-</span></div>
            <div class="stat-row"><span class="stat-label">Age:</span><span class="stat-value" id="p-age">-</span></div>
            <div class="stat-row"><span class="stat-label">Status:</span><span class="stat-value" id="p-status">-</span></div>
        </div>

        <!-- Vital Bars -->
        <div class="card">
            <h3>Vitals</h3>
            <div>
                <div class="stat-row"><span>Energy:</span><span id="v-energy">-</span></div>
                <div class="bar-container"><div id="bar-energy" class="bar energy-bar"></div></div>
            </div>
            <div style="margin-top:12px;">
                <div class="stat-row"><span>Nerve:</span><span id="v-nerve">-</span></div>
                <div class="bar-container"><div id="bar-nerve" class="bar nerve-bar"></div></div>
            </div>
            <div style="margin-top:12px;">
                <div class="stat-row"><span>Life:</span><span id="v-life">-</span></div>
                <div class="bar-container"><div id="bar-life" class="bar life-bar"></div></div>
            </div>
        </div>

        <!-- Financials -->
        <div class="card">
            <h3>Financials</h3>
            <div class="stat-row"><span class="stat-label">Cash on Hand:</span><span class="stat-value" id="f-cash">-</span></div>
            <div class="stat-row"><span class="stat-label">Points:</span><span class="stat-value" id="f-points">-</span></div>
            <div class="stat-row"><span class="stat-label">Cayman Bank:</span><span class="stat-value" id="f-cayman">-</span></div>
        </div>

        <!-- Battle Stats -->
        <div class="card">
            <h3>Battle Stats</h3>
            <div class="stat-row"><span class="stat-label">Speed:</span><span class="stat-value" id="s-speed">-</span></div>
            <div class="stat-row"><span class="stat-label">Strength:</span><span class="stat-value" id="s-strength">-</span></div>
            <div class="stat-row"><span class="stat-label">Defense:</span><span class="stat-value" id="s-defense">-</span></div>
            <div class="stat-row"><span class="stat-label">Dexterity:</span><span class="stat-value" id="s-dexterity">-</span></div>
            <div class="stat-row"><span class="stat-label">Total:</span><span class="stat-value" id="s-total" style="color:var(--success-color);">-</span></div>
        </div>
    </div>
</div>

<script>
async function fetchTornData() {
    const key = document.getElementById('apiKey').value.trim();
    const errorDiv = document.getElementById('errorMessage');
    const dashboardDiv = document.getElementById('dashboard');

    if (!key) {
        showError("Please enter an API key.");
        return;
    }

    errorDiv.style.display = "none";

    // Standard API URLs
    const userUrl = `https://torn.com{key}`;
    const statsUrl = `https://torn.com{key}`;

    // CORS Proxy Fallbacks (GitHub allows these seamlessly)
    const proxyUserUrl = `https://corsproxy.io` + encodeURIComponent(userUrl);
    const proxyStatsUrl = `https://corsproxy.io` + encodeURIComponent(statsUrl);

    try {
        const [userRes, statsRes] = await Promise.all([
            fetch(proxyUserUrl),
            fetch(proxyStatsUrl)
        ]);

        const userData = await userRes.json();
        const statsData = await statsRes.json();

        if (userData.error || statsData.error) {
            const err = userData.error || statsData.error;
            showError(`API Error: ${err.error} (Code ${err.code})`);
            return;
        }

        // Profile Details
        document.getElementById('p-name').innerText = `${userData.name || 'Unknown'} [${userData.player_id || '0'}]`;
        document.getElementById('p-level').innerText = userData.level || '0';
        document.getElementById('p-rank').innerText = userData.rank || 'N/A';
        document.getElementById('p-age').innerText = (userData.age || 0) + " days";
        
        if (userData.status) {
            document.getElementById('p-status').innerText = typeof userData.status === 'object' ? userData.status.description : userData.status;
        } else {
            document.getElementById('p-status').innerText = "Okay";
        }

        // Bars
        updateBar('energy', userData.energy);
        updateBar('nerve', userData.nerve);
        updateBar('life', userData.life);

        // Financials
        document.getElementById('f-cash').innerText = '$' + (userData.cash ? userData.cash.toLocaleString() : '0');
        document.getElementById('f-points').innerText = userData.points ? userData.points.toLocaleString() : '0';
        document.getElementById('f-cayman').innerText = '$' + (userData.cayman_bank ? userData.cayman_bank.toLocaleString() : '0');

        // Battle Stats
        document.getElementById('s-speed').innerText = statsData.speed ? statsData.speed.toLocaleString() : '0';
        document.getElementById('s-strength').innerText = statsData.strength ? statsData.strength.toLocaleString() : '0';
        document.getElementById('s-defense').innerText = statsData.defense ? statsData.defense.toLocaleString() : '0';
        document.getElementById('s-dexterity').innerText = statsData.dexterity ? statsData.dexterity.toLocaleString() : '0';
        document.getElementById('s-total').innerText = statsData.total ? statsData.total.toLocaleString() : '0';

        dashboardDiv.style.display = "grid";

    } catch (err) {
        showError("Network connection failed. Make sure your browser extensions are not blocking the proxy connection.");
        console.error(err);
    }
}

function updateBar(barName, dataObj) {
    if(!dataObj) return;
    const current = dataObj.current || 0;
    const max = dataObj.maximum || 100;
    const percent = Math.min((current / max) * 100, 100);
    
    document.getElementById(`v-${barName}`).innerText = `${current} / ${max}`;
    document.getElementById(`bar-${barName}`).style.width = `${percent}%`;
}

function showError(msg) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.innerText = msg;
    errorDiv.style.display = "block";
    document.getElementById('dashboard').style.display = "none";
}
</script>

</body>
</html>
